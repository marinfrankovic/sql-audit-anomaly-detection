version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/ai/functionapp"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      pip-minor-patch:
        update-types:
          - "minor"
          - "patch"
